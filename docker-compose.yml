version: '3.9'

services:
  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - NEXT_PUBLIC_GRAPH_POLL_SECONDS=8
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    ports:
      - '8000:8000'
    env_file:
      - .env.example
    depends_on:
      - mongodb
      - neo4j
      - redis
      - ai-services

  ai-services:
    build:
      context: .
      dockerfile: infrastructure/docker/ai-services.Dockerfile
    ports:
      - '8100:8100'

  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  neo4j:
    image: neo4j:5
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      - NEO4J_AUTH=neo4j/shadowgraph_password
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

volumes:
  mongo_data:
  neo4j_data:
